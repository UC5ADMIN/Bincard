<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bin Card Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #c8a96e;
    --accent2: #e8c98e;
    --text: #e8e8e8;
    --text-dim: #888;
    --text-dimmer: #555;
    --danger: #e05252;
    --success: #5ec48a;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-logo { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; }
  .header-sub  { font-family: var(--mono); font-size: 11px; color: var(--text-dimmer); letter-spacing: 0.08em; }

  .main { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

  /* API URL SETUP */
  .setup-box {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 20px 24px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .setup-label { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; white-space: nowrap; }
  .setup-input {
    flex: 1;
    min-width: 260px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    outline: none;
  }
  .setup-input:focus { border-color: var(--accent); }
  .setup-btn {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 4px;
    padding: 10px 20px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .setup-btn:hover { background: var(--accent2); }
  .setup-ok { color: var(--success); font-family: var(--mono); font-size: 12px; }

  /* SEARCH */
  .search-section { margin-bottom: 40px; }
  .search-label { font-family: var(--mono); font-size: 11px; color: var(--text-dimmer); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; display: block; }
  .search-row { display: flex; gap: 12px; align-items: stretch; }
  .search-input-wrap { position: relative; flex: 1; }
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px 14px 42px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-dimmer); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-dimmer); font-size: 16px; }
  .search-btn {
    background: var(--accent); color: #0f0f0f; border: none; border-radius: 4px;
    padding: 14px 28px; font-family: var(--mono); font-size: 13px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.08em; transition: background 0.2s; white-space: nowrap;
  }
  .search-btn:hover { background: var(--accent2); }
  .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* DROPDOWN */
  .search-results { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; z-index: 50; overflow: hidden; display: none; }
  .search-results.visible { display: block; }
  .result-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.15s; display: flex; align-items: center; gap: 12px; }
  .result-item:last-child { border-bottom: none; }
  .result-item:hover { background: var(--surface); }
  .result-code { font-family: var(--mono); font-size: 12px; color: var(--accent); min-width: 100px; }
  .result-name { font-size: 13px; color: var(--text); }
  .result-stock { margin-left: auto; font-family: var(--mono); font-size: 12px; color: var(--text-dim); }
  .no-results { padding: 14px 16px; font-family: var(--mono); font-size: 12px; color: var(--text-dimmer); }

  .status-msg { font-family: var(--mono); font-size: 12px; color: var(--text-dimmer); padding: 12px 0 0; min-height: 20px; }
  .status-msg.error { color: var(--danger); }
  .status-msg.loading { color: var(--accent); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 0 0 36px; }

  /* BIN CARD */
  .bin-card { display: none; }
  .bin-card.visible { display: block; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .card-header { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 28px; }
  .card-meta { background: var(--surface); padding: 20px 24px; }
  .card-meta-label { font-family: var(--mono); font-size: 10px; color: var(--text-dimmer); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
  .card-meta-value { font-family: var(--mono); font-size: 15px; color: var(--text); font-weight: 500; }
  .card-meta-value.accent { color: var(--accent); }
  .card-meta-value.large { font-size: 22px; font-weight: 600; }
  .card-meta-value.balance-low { color: var(--danger); }
  .card-meta-value.balance-ok  { color: var(--success); }

  .stats-row { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
  .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 10px 18px; display: flex; align-items: center; gap: 10px; }
  .stat-pill-label { font-family: var(--mono); font-size: 10px; color: var(--text-dimmer); letter-spacing: 0.12em; text-transform: uppercase; }
  .stat-pill-value { font-family: var(--mono); font-size: 13px; color: var(--text); font-weight: 600; }

  .table-title { font-family: var(--mono); font-size: 11px; color: var(--text-dimmer); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
  .table-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 6px; }
  table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 12px; }
  thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }
  th { padding: 12px 16px; text-align: left; font-size: 10px; font-weight: 600; color: var(--text-dimmer); letter-spacing: 0.12em; text-transform: uppercase; white-space: nowrap; }
  th.right { text-align: right; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.opening-row { background: rgba(200,169,110,0.06); }
  td { padding: 11px 16px; color: var(--text); white-space: nowrap; }
  td.right { text-align: right; }
  td.dim { color: var(--text-dim); }
  td.qty-in  { color: var(--success); font-weight: 600; }
  td.qty-out { color: #e07575; font-weight: 600; }
  td.balance-cell { font-weight: 600; }
  td.balance-low-cell { color: var(--danger) !important; }
  td.particulars { color: var(--accent); }
  td.opening-particulars { color: var(--accent); font-weight: 600; }

  .actions-row { display: flex; justify-content: flex-end; margin-bottom: 16px; }
  .print-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); border-radius: 4px; padding: 8px 18px; font-family: var(--mono); font-size: 12px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
  .print-btn:hover { border-color: var(--accent); color: var(--accent); }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .header { padding: 0 16px; }
    .main { padding: 24px 16px; }
    .card-header { grid-template-columns: 1fr 1fr; }
    .search-row { flex-direction: column; }
  }

  @media print {
    body { background: #fff; color: #000; }
    .header { background: #fff; border-color: #ccc; }
    .header-logo { color: #7a6030; }
    .setup-box, .search-section, .actions-row { display: none !important; }
    .card-meta { background: #f5f5f5; }
    .table-wrap { border-color: #ccc; }
    thead tr { background: #eee; }
    th, td.dim { color: #555; }
    td { color: #111; }
    td.qty-in { color: #2a7a4a; }
    td.qty-out { color: #a03030; }
    td.particulars, td.opening-particulars { color: #7a6030; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">⬡ BIN CARD VIEWER</div>
  <div class="header-sub">RAW MATERIAL WAREHOUSE</div>
</div>

<div class="main">

  <!-- API URL SETUP -->
  <div class="setup-box" id="setupBox">
    <span class="setup-label">API URL</span>
    <input type="text" class="setup-input" id="apiUrlInput" placeholder="Paste your Apps Script Web App URL here..." />
    <button class="setup-btn" onclick="saveApiUrl()">Save &amp; Connect</button>
    <span class="setup-ok" id="setupOk" style="display:none">✓ Connected</span>
  </div>

  <!-- SEARCH -->
  <div class="search-section">
    <span class="search-label">Search Material</span>
    <div class="search-row">
      <div class="search-input-wrap" id="searchWrap">
        <span class="search-icon">⌕</span>
        <input type="text" class="search-input" id="searchInput"
          placeholder="Enter item code or name..."
          autocomplete="off"
          oninput="onSearchInput(this.value)"
          onkeydown="onSearchKeydown(event)" />
        <div class="search-results" id="searchResults"></div>
      </div>
      <button class="search-btn" id="searchBtn" onclick="triggerSearch()">View Bin Card</button>
    </div>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <hr class="divider">

  <!-- BIN CARD -->
  <div class="bin-card" id="binCard">
    <div class="card-header" id="cardHeader"></div>
    <div class="stats-row" id="statsRow"></div>
    <div class="actions-row">
      <button class="print-btn" onclick="window.print()">⎙ Print Bin Card</button>
    </div>
    <div class="table-title">Transaction Ledger</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Date / Time</th>
            <th>Particulars</th>
            <th>Category</th>
            <th>Issued To</th>
            <th class="right">Qty In</th>
            <th class="right">Qty Out</th>
            <th class="right">Balance</th>
            <th>Unit</th>
          </tr>
        </thead>
        <tbody id="binCardBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
  // ── API URL management ──────────────────────────────────────
  var API_URL = localStorage.getItem('bincard_api_url') || '';

  (function init() {
    if (API_URL) {
      document.getElementById('apiUrlInput').value = API_URL;
      document.getElementById('setupOk').style.display = 'inline';
    }
  })();

  function saveApiUrl() {
    var val = document.getElementById('apiUrlInput').value.trim();
    if (!val) { alert('Please paste your Apps Script Web App URL.'); return; }
    API_URL = val;
    localStorage.setItem('bincard_api_url', val);
    document.getElementById('setupOk').style.display = 'inline';
    setStatus('API URL saved. Start searching!');
  }

  function apiCall(params) {
    if (!API_URL) {
      return Promise.reject(new Error('No API URL set. Please paste your Apps Script URL above.'));
    }
    var url = API_URL + '?' + Object.keys(params).map(function(k) {
      return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
    }).join('&');
    return fetch(url)
      .then(function(r) { return r.json(); })
      .catch(function() {
        // Apps Script sometimes returns from a redirect — try again with no-cors workaround
        return fetch(url, { redirect: 'follow' }).then(function(r) { return r.json(); });
      });
  }

  // ── Search ──────────────────────────────────────────────────
  var searchTimeout = null;
  var selectedCode  = null;

  function onSearchInput(val) {
    selectedCode = null;
    clearTimeout(searchTimeout);
    if (val.length < 2) { hideResults(); return; }
    searchTimeout = setTimeout(function() { runSearch(val); }, 350);
  }

  function onSearchKeydown(e) {
    if (e.key === 'Enter')  triggerSearch();
    if (e.key === 'Escape') hideResults();
  }

  function runSearch(query) {
    apiCall({ action: 'searchItems', query: query })
      .then(function(res) {
        if (!res.success || !res.results || res.results.length === 0) {
          showResults('<div class="no-results">No items found for "' + escHtml(query) + '"</div>');
          return;
        }
        var html = '';
        res.results.forEach(function(r) {
          html += '<div class="result-item" onclick="selectItem(\'' + escAttr(r.code) + '\',\'' + escAttr(r.name) + '\')">' +
            '<span class="result-code">' + escHtml(r.code) + '</span>' +
            '<span class="result-name">'  + escHtml(r.name) + '</span>' +
            '<span class="result-stock">Opening: ' + r.openingStock + '</span>' +
            '</div>';
        });
        showResults(html);
      })
      .catch(function(err) {
        showResults('<div class="no-results">Error: ' + escHtml(err.message) + '</div>');
      });
  }

  function selectItem(code, name) {
    selectedCode = code;
    document.getElementById('searchInput').value = code + ' — ' + name;
    hideResults();
    loadBinCard(code);
  }

  function triggerSearch() {
    var val = document.getElementById('searchInput').value.trim();
    if (!val) return;
    if (selectedCode) { loadBinCard(selectedCode); return; }
    loadBinCard(val.split('—')[0].trim());
  }

  function showResults(html) {
    var el = document.getElementById('searchResults');
    el.innerHTML = html;
    el.classList.add('visible');
  }
  function hideResults() {
    document.getElementById('searchResults').classList.remove('visible');
  }
  document.addEventListener('click', function(e) {
    if (!document.getElementById('searchWrap').contains(e.target)) hideResults();
  });

  // ── Bin Card ────────────────────────────────────────────────
  function setStatus(msg, cls) {
    var el = document.getElementById('statusMsg');
    el.innerHTML = msg;
    el.className = 'status-msg' + (cls ? ' ' + cls : '');
  }

  function loadBinCard(code) {
    if (!API_URL) { setStatus('Please save your API URL first.', 'error'); return; }
    setStatus('<span class="spinner"></span> Loading bin card...', 'loading');
    document.getElementById('searchBtn').disabled = true;
    document.getElementById('binCard').classList.remove('visible');

    apiCall({ action: 'getBinCard', itemCode: code })
      .then(function(res) {
        document.getElementById('searchBtn').disabled = false;
        if (!res.success) { setStatus('Error: ' + res.error, 'error'); return; }
        setStatus('Showing bin card · ' + res.txCount + ' transaction(s) · Total issued: ' + res.totalIssued + ' ' + res.unit);
        renderBinCard(res);
      })
      .catch(function(err) {
        document.getElementById('searchBtn').disabled = false;
        setStatus('Failed to load: ' + err.message, 'error');
      });
  }

  function renderBinCard(d) {
    var balClass = d.currentBalance <= 0 ? 'large balance-low'
                 : d.currentBalance <= (d.openingStock * 0.1) ? 'large balance-low'
                 : 'large balance-ok';

    document.getElementById('cardHeader').innerHTML =
      metaCell('ITEM CODE',       '<span class="accent">' + escHtml(d.itemCode) + '</span>') +
      metaCell('ITEM NAME',       escHtml(d.itemName)) +
      metaCell('UNIT',            escHtml(d.unit)) +
      metaCell('OPENING STOCK',   d.openingStock + (d.unit ? ' ' + escHtml(d.unit) : '')) +
      metaCell('OPENING DATE',    d.openingDate) +
      metaCell('CURRENT BALANCE', '<span class="' + balClass + '">' + d.currentBalance + (d.unit ? ' ' + escHtml(d.unit) : '') + '</span>');

    document.getElementById('statsRow').innerHTML =
      statPill('Total Transactions', d.txCount) +
      statPill('Total Qty Issued',   d.totalIssued + ' ' + escHtml(d.unit)) +
      statPill('% Consumed',         d.openingStock > 0 ? Math.round((d.totalIssued / d.openingStock) * 100) + '%' : '—');

    var tbody = '';
    d.rows.forEach(function(row, idx) {
      var isOpening  = row.particulars === 'Opening Balance';
      var balLow     = row.balance <= 0 ? ' balance-low-cell' : '';
      tbody +=
        '<tr class="' + (isOpening ? 'opening-row' : '') + '">' +
        '<td class="dim">' + idx + '</td>' +
        '<td class="dim">' + escHtml(row.date) + '</td>' +
        '<td class="' + (isOpening ? 'opening-particulars' : 'particulars') + '">' + escHtml(row.particulars) + '</td>' +
        '<td class="dim">' + escHtml(row.category) + '</td>' +
        '<td>' + escHtml(row.issuedTo) + '</td>' +
        '<td class="right qty-in">'  + (row.qtyIn  != null ? row.qtyIn  : '—') + '</td>' +
        '<td class="right qty-out">' + (row.qtyOut != null ? row.qtyOut : '—') + '</td>' +
        '<td class="right balance-cell' + balLow + '">' + row.balance + '</td>' +
        '<td class="dim">' + escHtml(row.unit) + '</td>' +
        '</tr>';
    });
    if (!tbody) tbody = '<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--text-dimmer);font-family:var(--mono);font-size:12px;">No transactions found.</td></tr>';
    document.getElementById('binCardBody').innerHTML = tbody;
    document.getElementById('binCard').classList.add('visible');
  }

  function metaCell(label, value) {
    return '<div class="card-meta"><div class="card-meta-label">' + label + '</div><div class="card-meta-value">' + value + '</div></div>';
  }
  function statPill(label, value) {
    return '<div class="stat-pill"><span class="stat-pill-label">' + label + '</span><span class="stat-pill-value">' + value + '</span></div>';
  }
  function escHtml(s)  { return s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function escAttr(s)  { return s == null ? '' : String(s).replace(/'/g,"\\'"); }
</script>
</body>
</html>
