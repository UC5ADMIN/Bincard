<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="RL2 Warehouse Manager">
<title>RL2 Warehouse</title>
<style>
/* ── RESET & BASE ─────────────────────────────────────────────
   System font stack: works on every device, zero network cost  */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.5;
  background:#f7f7f5;color:#1a1a1a;min-height:100vh;
}
a{color:inherit}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}

/* ── TOKENS ───────────────────────────────────────────────── */
/* Using plain values — no CSS variables for IE11 compatibility */

/* ── HEADER ───────────────────────────────────────────────── */
.hdr{
  background:#fff;border-bottom:1px solid #e0e0e0;
  padding:0 20px;height:52px;
  display:-webkit-box;display:flex;
  -webkit-box-align:center;align-items:center;
  -webkit-box-pack:justify;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.hdr-brand{display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:10px}
.hdr-icon{
  width:28px;height:28px;background:#2c5f2e;border-radius:4px;
  display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;
  flex-shrink:0;
}
.hdr-icon svg{width:15px;height:15px;fill:#fff}
.hdr-title{font-size:15px;font-weight:600;color:#1a1a1a;letter-spacing:-.01em}
.hdr-sub{font-size:11px;color:#999;letter-spacing:.04em}

/* ── LAYOUT ───────────────────────────────────────────────── */
.wrap{max-width:960px;margin:0 auto;padding:24px 16px 48px}

/* ── SETUP BAR ────────────────────────────────────────────── */
.setup{
  background:#fff;border:1px solid #e0e0e0;
  border-radius:6px;padding:14px 16px;margin-bottom:24px;
}
.setup.ok{border-color:#a8d5b5;background:#f4fdf6}
.setup-row{display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:8px;margin-bottom:10px}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
.dot.on{background:#2c7a3e}
.setup-lbl{font-size:11px;color:#666;letter-spacing:.06em;text-transform:uppercase;font-weight:500}
.setup-st{margin-left:auto;font-size:11px;font-weight:500;color:#999}
.setup-st.on{color:#2c7a3e}
.setup-inputs{display:-webkit-box;display:flex;gap:8px}
.setup-url{
  -webkit-box-flex:1;flex:1;border:1px solid #d0d0d0;border-radius:5px;
  padding:8px 11px;font-size:12px;color:#1a1a1a;outline:none;
  background:#fafafa;
}
.setup-url:focus{border-color:#2c5f2e}
.setup-url::placeholder{color:#bbb}
.btn-save{
  background:#2c5f2e;color:#fff;border:none;border-radius:5px;
  padding:8px 16px;font-size:12px;font-weight:600;white-space:nowrap;
  letter-spacing:.02em;
}
.btn-save:hover{background:#245025}
.btn-save:active{opacity:.85}

/* ── SECTION ──────────────────────────────────────────────── */
.section{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:20px;margin-bottom:20px}
.sec-hdr{display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:10px;margin-bottom:18px}
.sec-ico{
  width:30px;height:30px;border-radius:5px;
  display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;
  flex-shrink:0;
}
.sec-ico svg{width:15px;height:15px}
.ico-green{background:#eaf4eb}.ico-green svg{fill:#2c5f2e}
.ico-slate{background:#eef2f8}.ico-slate svg{fill:#2c4a7c}
.sec-title{font-size:16px;font-weight:600;color:#1a1a1a;letter-spacing:-.01em}
.sec-sub{font-size:12px;color:#999;margin-top:1px}

/* ── FORM FIELDS ──────────────────────────────────────────── */
.field{margin-bottom:16px}
.field:last-child{margin-bottom:0}
.flbl{
  display:block;font-size:11px;font-weight:600;color:#555;
  letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;
}
.finput{
  width:100%;border:1px solid #d0d0d0;border-radius:5px;
  padding:10px 12px;font-size:14px;color:#1a1a1a;outline:none;
  background:#fafafa;
}
.finput:focus{border-color:#2c5f2e;background:#fff}
.finput::placeholder{color:#bbb}
.finput.mono{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;font-size:13px}

/* ── SEARCH WRAP + DROPDOWN ───────────────────────────────── */
.srchwrap{position:relative}
.drop{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:#fff;border:1px solid #d0d0d0;border-radius:6px;
  z-index:50;overflow:hidden;display:none;
  -webkit-box-shadow:0 4px 16px rgba(0,0,0,.1);
  box-shadow:0 4px 16px rgba(0,0,0,.1);
}
.drop.open{display:block}
.d-item{
  padding:10px 12px;cursor:pointer;
  border-bottom:1px solid #f0f0f0;
  display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:10px;
}
.d-item:last-child{border-bottom:none}
.d-item:hover{background:#f5faf5}
.d-code{font-size:11px;font-weight:600;color:#2c5f2e;min-width:80px;font-family:'SFMono-Regular',Consolas,monospace}
.d-name{font-size:13px;color:#1a1a1a;-webkit-box-flex:1;flex:1}
.d-stock{font-size:11px;color:#999;font-family:'SFMono-Regular',Consolas,monospace;white-space:nowrap}
.d-empty{padding:12px;font-size:12px;color:#999;font-style:italic}

/* Item preview chip */
.preview{
  margin-top:7px;padding:9px 12px;
  background:#eaf4eb;border:1px solid #b8dfc0;border-radius:5px;
  display:none;-webkit-box-align:center;align-items:center;gap:10px;
  flex-wrap:wrap;
}
.preview.show{display:-webkit-box;display:flex}
.prev-code{font-size:11px;font-weight:600;color:#2c5f2e;font-family:'SFMono-Regular',Consolas,monospace}
.prev-name{font-size:13px;color:#1a1a1a}
.prev-stock{margin-left:auto;font-size:11px;color:#666;font-family:'SFMono-Regular',Consolas,monospace}

/* ── QTY + UNIT ROW ───────────────────────────────────────── */
.qty-row{display:-webkit-box;display:flex;gap:8px}
.qty-row .finput{-webkit-box-flex:1;flex:1}
.unit-chip{
  border:1px solid #d0d0d0;border-radius:5px;padding:10px 14px;
  font-size:13px;color:#888;background:#f0f0f0;white-space:nowrap;
  display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;
  min-width:60px;-webkit-box-pack:center;justify-content:center;
  font-family:'SFMono-Regular',Consolas,monospace;
}

/* ── BUTTONS ──────────────────────────────────────────────── */
.btn-primary{
  width:100%;border:none;border-radius:6px;
  padding:12px;font-size:15px;font-weight:600;color:#fff;
  letter-spacing:.01em;margin-top:4px;
  display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;
  gap:7px;
}
.btn-primary:active{opacity:.85}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-green{background:#2c5f2e}.btn-green:hover{background:#245025}
.btn-slate{background:#2c4a7c}.btn-slate:hover{background:#23397a}

.btn-view{
  background:#2c4a7c;color:#fff;border:none;border-radius:6px;
  padding:10px 20px;font-size:14px;font-weight:600;white-space:nowrap;
  letter-spacing:.01em;
}
.btn-view:hover{background:#23397a}
.btn-view:active{opacity:.85}
.btn-view:disabled{opacity:.5;cursor:not-allowed}

.btn-print{
  background:transparent;border:1px solid #d0d0d0;color:#666;
  border-radius:5px;padding:7px 14px;font-size:12px;
  float:right;
}
.btn-print:hover{border-color:#2c4a7c;color:#2c4a7c}

/* ── BIN CARD SEARCH ROW ──────────────────────────────────── */
.bc-row{display:-webkit-box;display:flex;gap:8px;margin-bottom:8px}
.bc-row .srchwrap{-webkit-box-flex:1;flex:1}

/* ── STATUS LINE ──────────────────────────────────────────── */
.status{font-size:12px;color:#999;min-height:18px;margin-bottom:14px}
.status.err{color:#c0392b}
.status.busy{color:#2c4a7c}

/* ── BIN CARD RESULT ──────────────────────────────────────── */
.bc-result{display:none;margin-top:4px}
.bc-result.show{display:block}

/* Meta grid */
.meta-grid{
  display:-webkit-box;display:flex;flex-wrap:wrap;
  border:1px solid #e0e0e0;border-radius:6px;overflow:hidden;
  margin-bottom:14px;
}
.meta-cell{
  -webkit-box-flex:1;flex:1;min-width:160px;
  padding:12px 14px;border-right:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0;
  background:#fff;
}
.meta-cell:last-child{border-right:none}
.meta-lbl{font-size:10px;font-weight:600;color:#999;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.meta-val{font-size:15px;font-weight:600;color:#1a1a1a}
.meta-val.code{font-family:'SFMono-Regular',Consolas,monospace;font-size:13px;color:#2c5f2e}
.meta-val.good{color:#2c7a3e}
.meta-val.warn{color:#c0392b}

/* Pill stats */
.pills{display:-webkit-box;display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.pill{
  border:1px solid #e0e0e0;border-radius:4px;padding:7px 12px;
  background:#fff;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:8px;
}
.pill-lbl{font-size:10px;font-weight:600;color:#999;letter-spacing:.06em;text-transform:uppercase}
.pill-val{font-size:13px;font-weight:600;color:#1a1a1a;font-family:'SFMono-Regular',Consolas,monospace}

/* Table */
.tbl-wrap{overflow-x:auto;border:1px solid #e0e0e0;border-radius:6px;margin-top:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#f5f5f3}
th{
  padding:9px 12px;text-align:left;font-size:10px;font-weight:700;
  color:#888;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;
  border-bottom:1px solid #e0e0e0;
}
th.r{text-align:right}
tbody tr{border-bottom:1px solid #f0f0f0}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fafafa}
tr.t-open{background:#fdfcf8}
tr.t-recv{background:#f0f6ff}
td{padding:9px 12px;color:#1a1a1a;white-space:nowrap}
td.r{text-align:right}
td.dim{color:#888}
td.in{color:#2c7a3e;font-weight:600}
td.in-r{color:#2c4a7c;font-weight:600}
td.out{color:#c0392b;font-weight:600}
td.bal{font-weight:700}
td.bal-low{color:#c0392b!important;font-weight:700}
.badge{
  display:inline-block;padding:2px 7px;border-radius:3px;
  font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
}
.b-open{background:#fef3e2;color:#976b1a}
.b-issue{background:#fdecea;color:#b03030}
.b-recv{background:#e8f0fc;color:#2c4a7c}

/* ── DIVIDER ──────────────────────────────────────────────── */
.divider{border:none;border-top:1px solid #e8e8e8;margin:20px 0}

/* ── TOAST ────────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:20px;left:50%;
  -webkit-transform:translateX(-50%) translateY(12px);
  transform:translateX(-50%) translateY(12px);
  background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:6px;
  font-size:13px;font-weight:500;opacity:0;pointer-events:none;
  -webkit-transition:all .22s;transition:all .22s;z-index:999;white-space:nowrap;
}
.toast.ok{background:#2c7a3e}
.toast.err{background:#c0392b}
.toast.show{opacity:1;-webkit-transform:translateX(-50%) translateY(0);transform:translateX(-50%) translateY(0)}

/* ── SPINNER ──────────────────────────────────────────────── */
.spin{
  display:inline-block;width:13px;height:13px;
  border:2px solid rgba(255,255,255,.35);border-top-color:#fff;
  border-radius:50%;
  -webkit-animation:spin .7s linear infinite;
  animation:spin .7s linear infinite;
  vertical-align:middle;
}
.spin-d{border-color:#e0e0e0;border-top-color:#2c4a7c}
@-webkit-keyframes spin{to{-webkit-transform:rotate(360deg);transform:rotate(360deg)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ───────────────────────────────────────────── */
@media(max-width:600px){
  .hdr{padding:0 14px}
  .wrap{padding:14px 12px 40px}
  .section{padding:16px}
  .meta-cell{min-width:140px}
  .bc-row{-webkit-box-orient:vertical;-webkit-box-direction:normal;flex-direction:column}
}

/* ── PRINT ────────────────────────────────────────────────── */
@media print{
  body{background:#fff}
  .hdr,.setup,.section:first-of-type,.divider,.btn-print,.pills,.status{display:none!important}
  .section{border:none;padding:0}
  .tbl-wrap,.meta-grid{border-color:#ccc}
  tr.t-recv{background:#eef4ff}
  .badge{border:1px solid currentColor}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-icon">
      <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2zm0 12H4V9h16v10zM4 5h16V3H4v2z"/></svg>
    </div>
    <div>
      <div class="hdr-title">RL2 Warehouse</div>
      <div class="hdr-sub">RAW MATERIAL STORE</div>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- API SETUP -->
  <div class="setup" id="setup">
    <div class="setup-row">
      <div class="dot" id="dot"></div>
      <span class="setup-lbl">API URL</span>
      <span class="setup-st" id="setupSt">Not connected</span>
    </div>
    <div class="setup-inputs">
      <input type="url" class="setup-url" id="apiUrl"
        placeholder="https://script.google.com/macros/s/…/exec"
        autocomplete="off" />
      <button class="btn-save" onclick="saveUrl()">Connect</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       RECEIVE STOCK
  ═══════════════════════════════════════════ -->
  <div class="section">
    <div class="sec-hdr">
      <div class="sec-ico ico-green">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      </div>
      <div>
        <div class="sec-title">Receive Stock</div>
        <div class="sec-sub">Add incoming material to inventory</div>
      </div>
    </div>

    <!-- Item search -->
    <div class="field">
      <label class="flbl">Item</label>
      <div class="srchwrap" id="rcvWrap">
        <input type="text" class="finput" id="rcvSearch"
          placeholder="Type item code or name…"
          autocomplete="off"
          oninput="onRcvInput(this.value)"
          onkeydown="if(event.key==='Escape')closeDrop('rcvDrop')" />
        <div class="drop" id="rcvDrop"></div>
      </div>
      <div class="preview" id="rcvPreview">
        <span class="prev-code" id="prevCode"></span>
        <span class="prev-name" id="prevName"></span>
        <span class="prev-stock" id="prevStock"></span>
      </div>
    </div>

    <!-- Qty + Unit -->
    <div class="field">
      <label class="flbl">Quantity Received</label>
      <div class="qty-row">
        <input type="number" class="finput mono" id="rcvQty"
          placeholder="0" min="0.001" step="any" />
        <div class="unit-chip" id="rcvUnit">—</div>
      </div>
    </div>

    <!-- Remarks -->
    <div class="field">
      <label class="flbl">Remarks <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#aaa">(optional)</span></label>
      <input type="text" class="finput" id="rcvRemarks"
        placeholder="Invoice no., supplier, notes…" />
    </div>

    <button class="btn-primary btn-green" id="rcvBtn" onclick="submitReceipt()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      Confirm Receipt
    </button>
  </div>

  <hr class="divider">

  <!-- ══════════════════════════════════════════
       BIN CARD
  ═══════════════════════════════════════════ -->
  <div class="section">
    <div class="sec-hdr">
      <div class="sec-ico ico-slate">
        <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
      </div>
      <div>
        <div class="sec-title">Bin Card</div>
        <div class="sec-sub">Full transaction ledger for any item</div>
      </div>
    </div>

    <div class="bc-row">
      <div class="srchwrap" id="bcWrap">
        <input type="text" class="finput" id="bcSearch"
          placeholder="Type item code or name…"
          autocomplete="off"
          oninput="onBcInput(this.value)"
          onkeydown="onBcKey(event)" />
        <div class="drop" id="bcDrop"></div>
      </div>
      <button class="btn-view" id="bcBtn" onclick="triggerBc()">View</button>
    </div>

    <div class="status" id="bcStatus"></div>

    <!-- Result -->
    <div class="bc-result" id="bcResult">
      <button class="btn-print" onclick="window.print()">⎙ Print</button>
      <div id="metaGrid" class="meta-grid"></div>
      <div id="bcPills"  class="pills"></div>
      <div style="clear:both"></div>
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Date</th>
              <th>Type</th>
              <th>Category</th>
              <th>Reference</th>
              <th class="r">In</th>
              <th class="r">Out</th>
              <th class="r">Balance</th>
              <th>Unit</th>
            </tr>
          </thead>
          <tbody id="bcBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div><!-- /wrap -->

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
var API = localStorage.getItem('rl2_api') || '';
var rcvItem = null;   // currently selected receipt item
var bcCode  = null;   // currently selected bin card code
var rcvT    = null;   // debounce timer for receipt search
var bcT     = null;   // debounce timer for bin card search

// ── INIT ────────────────────────────────────────────────────
(function(){
  if (API) {
    document.getElementById('apiUrl').value = API;
    setConnected(true);
  }
})();

// ── API SETUP ────────────────────────────────────────────────
function setConnected(ok) {
  document.getElementById('dot').className     = ok ? 'dot on' : 'dot';
  document.getElementById('setupSt').className = ok ? 'setup-st on' : 'setup-st';
  document.getElementById('setupSt').textContent = ok ? '✓ Connected' : 'Not connected';
  document.getElementById('setup').className   = ok ? 'setup ok' : 'setup';
}

function saveUrl() {
  var v = document.getElementById('apiUrl').value.trim();
  if (!v || v.indexOf('https://') !== 0) {
    alert('Please paste a valid Apps Script URL (starts with https://)');
    return;
  }
  API = v;
  localStorage.setItem('rl2_api', v);
  setConnected(true);
}

// ── CORE API CALL ─────────────────────────────────────────────
function call(params, onSuccess, onError) {
  if (!API) { if (onError) onError('No API URL. Please connect first.'); return; }
  var qs = [];
  for (var k in params) {
    if (params.hasOwnProperty(k)) {
      qs.push(encodeURIComponent(k) + '=' + encodeURIComponent(params[k]));
    }
  }
  var url = API + '?' + qs.join('&');

  // Use XMLHttpRequest for broadest device compatibility
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 400) {
      try {
        var data = JSON.parse(xhr.responseText);
        if (onSuccess) onSuccess(data);
      } catch(e) {
        if (onError) onError('Invalid response from server.');
      }
    } else {
      if (onError) onError('HTTP error ' + xhr.status);
    }
  };
  xhr.onerror = function() {
    // Apps Script redirects — try fetch as fallback if available
    if (window.fetch) {
      fetch(url, {redirect:'follow'})
        .then(function(r){ return r.json(); })
        .then(function(d){ if (onSuccess) onSuccess(d); })
        .catch(function(e){ if (onError) onError(e.message); });
    } else {
      if (onError) onError('Network error. Check connection.');
    }
  };
  xhr.send();
}

// ── DROPDOWN HELPERS ─────────────────────────────────────────
function openDrop(id, html) {
  var el = document.getElementById(id);
  el.innerHTML = html;
  el.className = 'drop open';
}
function closeDrop(id) {
  document.getElementById(id).className = 'drop';
}
document.addEventListener('click', function(e) {
  if (!document.getElementById('rcvWrap').contains(e.target)) closeDrop('rcvDrop');
  if (!document.getElementById('bcWrap').contains(e.target))  closeDrop('bcDrop');
});

// Build dropdown HTML from results array
function buildDrop(results, onClickFn) {
  if (!results || !results.length) return '<div class="d-empty">No items found</div>';
  var h = '';
  for (var i = 0; i < results.length; i++) {
    var r = results[i];
    // Encode for inline onclick — use data attributes to avoid injection
    h += '<div class="d-item" data-idx="'+i+'">' +
      '<span class="d-code">'+esc(r.code)+'</span>' +
      '<span class="d-name">'+esc(r.name)+'</span>' +
      '<span class="d-stock">'+(r.openingStock !== undefined ? 'Op: '+r.openingStock : 'Stk: '+r.quantity)+'</span>' +
      '</div>';
  }
  return h;
}

// ── RECEIPT SEARCH ────────────────────────────────────────────
function onRcvInput(v) {
  rcvItem = null; clearPreview();
  clearTimeout(rcvT);
  if (!v.trim()) { closeDrop('rcvDrop'); return; }
  rcvT = setTimeout(function() { doRcvSearch(v); }, 400);
}

function doRcvSearch(q) {
  call({ action:'searchItems', query:q }, function(res) {
    if (!res.success || !res.results || !res.results.length) {
      openDrop('rcvDrop', '<div class="d-empty">No items found for "'+esc(q)+'"</div>');
      return;
    }
    // Store results for click handler
    window._rcvResults = res.results;
    var html = buildDrop(res.results);
    openDrop('rcvDrop', html);
    // Attach click handlers
    var items = document.getElementById('rcvDrop').getElementsByClassName('d-item');
    for (var i = 0; i < items.length; i++) {
      (function(idx) {
        items[idx].onclick = function() { selectRcvItem(window._rcvResults[idx]); };
      })(i);
    }
  }, function(err) {
    openDrop('rcvDrop', '<div class="d-empty">Error: '+esc(err)+'</div>');
  });
}

function selectRcvItem(item) {
  rcvItem = item;
  document.getElementById('rcvSearch').value = item.code + ' — ' + item.name;
  document.getElementById('rcvUnit').textContent = item.unit || '—';
  document.getElementById('prevCode').textContent  = item.code;
  document.getElementById('prevName').textContent  = item.name;
  document.getElementById('prevStock').textContent = 'Current: ' + (item.quantity !== undefined ? item.quantity : item.openingStock) + ' ' + item.unit;
  document.getElementById('rcvPreview').className  = 'preview show';
  closeDrop('rcvDrop');
  document.getElementById('rcvQty').focus();
}

function clearPreview() {
  document.getElementById('rcvPreview').className = 'preview';
}

// ── SUBMIT RECEIPT ────────────────────────────────────────────
function submitReceipt() {
  if (!API)     { showToast('Please connect API first.','err'); return; }
  if (!rcvItem) { showToast('Select an item first.','err'); return; }
  var qty = parseFloat(document.getElementById('rcvQty').value);
  if (!qty || isNaN(qty) || qty <= 0) { showToast('Enter a valid quantity.','err'); return; }
  var remarks = document.getElementById('rcvRemarks').value.trim();

  var btn = document.getElementById('rcvBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Recording…';

  call(
    { action:'receiveItem', itemCode:rcvItem.code, qty:qty, remarks:remarks, timestamp:new Date().toISOString() },
    function(res) {
      btn.disabled = false;
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Confirm Receipt';
      if (!res.success) { showToast('Error: '+(res.error||'Unknown'),'err'); return; }

      showToast('✓ Received '+qty+' '+res.unit+' of '+res.itemName,'ok');

      // If bin card is showing this item, auto-refresh it
      if (bcCode === rcvItem.code && document.getElementById('bcResult').className === 'bc-result show') {
        loadBinCard(bcCode);
      }

      // Reset form
      document.getElementById('rcvSearch').value  = '';
      document.getElementById('rcvQty').value     = '';
      document.getElementById('rcvRemarks').value = '';
      document.getElementById('rcvUnit').textContent = '—';
      clearPreview();
      rcvItem = null;
    },
    function(err) {
      btn.disabled = false;
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Confirm Receipt';
      showToast('Failed: '+err,'err');
    }
  );
}

// ── BIN CARD SEARCH ───────────────────────────────────────────
function onBcInput(v) {
  bcCode = null; clearTimeout(bcT);
  if (v.length < 2) { closeDrop('bcDrop'); return; }
  bcT = setTimeout(function() { doBcSearch(v); }, 400);
}
function onBcKey(e) {
  if (e.key === 'Enter')  triggerBc();
  if (e.key === 'Escape') closeDrop('bcDrop');
}

function doBcSearch(q) {
  call({ action:'searchItems', query:q }, function(res) {
    if (!res.success || !res.results || !res.results.length) {
      openDrop('bcDrop', '<div class="d-empty">No items found</div>');
      return;
    }
    window._bcResults = res.results;
    var html = buildDrop(res.results);
    openDrop('bcDrop', html);
    var items = document.getElementById('bcDrop').getElementsByClassName('d-item');
    for (var i = 0; i < items.length; i++) {
      (function(idx) {
        items[idx].onclick = function() { selectBcItem(window._bcResults[idx]); };
      })(i);
    }
  }, function() {
    openDrop('bcDrop', '<div class="d-empty">Search error</div>');
  });
}

function selectBcItem(item) {
  bcCode = item.code;
  document.getElementById('bcSearch').value = item.code + ' — ' + item.name;
  closeDrop('bcDrop');
  loadBinCard(item.code);
}
function triggerBc() {
  var v = document.getElementById('bcSearch').value.trim();
  if (!v) return;
  var code = bcCode || v.split('—')[0].trim();
  loadBinCard(code);
}

// ── LOAD & RENDER BIN CARD ────────────────────────────────────
function setBcSt(msg, cls) {
  var el = document.getElementById('bcStatus');
  el.textContent = msg;
  el.className   = cls ? 'status ' + cls : 'status';
}

function loadBinCard(code) {
  if (!API) { setBcSt('Please connect API first.','err'); return; }
  setBcSt('Loading…','busy');
  document.getElementById('bcBtn').disabled = true;
  document.getElementById('bcResult').className = 'bc-result';

  call(
    { action:'getBinCard', itemCode:code },
    function(res) {
      document.getElementById('bcBtn').disabled = false;
      if (!res.success) { setBcSt('Error: '+res.error,'err'); return; }
      bcCode = code;
      setBcSt(res.txCount+' transaction(s) · Balance: '+res.currentBalance+' '+res.unit);
      renderBinCard(res);
    },
    function(err) {
      document.getElementById('bcBtn').disabled = false;
      setBcSt('Failed: '+err,'err');
    }
  );
}

function renderBinCard(d) {
  var pct    = d.openingStock > 0 ? (d.totalIssued / d.openingStock) * 100 : 0;
  var balCls = (d.currentBalance <= 0 || pct >= 90) ? 'meta-val warn' : 'meta-val good';

  // Meta cells
  document.getElementById('metaGrid').innerHTML =
    mc('Item Code',       '<span class="meta-val code">'+esc(d.itemCode)+'</span>') +
    mc('Item Name',       '<span class="meta-val">'+esc(d.itemName)+'</span>') +
    mc('Unit',            '<span class="meta-val">'+esc(d.unit)+'</span>') +
    mc('Opening Stock',   '<span class="meta-val">'+d.openingStock+'</span>') +
    mc('Opening Date',    '<span class="meta-val">'+esc(d.openingDate)+'</span>') +
    mc('Balance',         '<span class="'+balCls+'">'+d.currentBalance+'</span>');

  // Pills
  document.getElementById('bcPills').innerHTML =
    pl('Transactions',  d.txCount) +
    pl('Issued',        d.totalIssued+' '+esc(d.unit)) +
    pl('Received',      d.totalReceived+' '+esc(d.unit)) +
    pl('% Consumed',    d.openingStock > 0 ? Math.round(pct)+'%' : '—');

  // Table rows
  var tbody = '';
  for (var i = 0; i < d.rows.length; i++) {
    var row     = d.rows[i];
    var isOpen  = row.particulars === 'Opening Balance';
    var isRecv  = row.particulars === 'Receipt';
    var trCls   = isOpen ? 't-open' : isRecv ? 't-recv' : '';
    var bdgCls  = isOpen ? 'badge b-open' : isRecv ? 'badge b-recv' : 'badge b-issue';
    var balLow  = row.balance <= 0 ? ' bal-low' : '';
    var inCls   = isOpen ? 'in' : isRecv ? 'in-r' : '';
    tbody +=
      '<tr class="'+trCls+'">'+
      '<td class="dim">'+i+'</td>'+
      '<td class="dim">'+esc(row.date)+'</td>'+
      '<td><span class="'+bdgCls+'">'+esc(row.particulars)+'</span></td>'+
      '<td class="dim">'+esc(row.category)+'</td>'+
      '<td class="dim">'+esc(row.ref)+'</td>'+
      '<td class="r '+inCls+'">'+(row.qtyIn  != null ? row.qtyIn  : '—')+'</td>'+
      '<td class="r out">'+(row.qtyOut != null ? row.qtyOut : '—')+'</td>'+
      '<td class="r bal'+balLow+'">'+row.balance+'</td>'+
      '<td class="dim">'+esc(row.unit)+'</td>'+
      '</tr>';
  }
  if (!tbody) tbody = '<tr><td colspan="9" style="text-align:center;padding:24px;color:#999;font-style:italic">No transactions found.</td></tr>';
  document.getElementById('bcBody').innerHTML = tbody;
  document.getElementById('bcResult').className = 'bc-result show';
}

// ── HELPERS ───────────────────────────────────────────────────
function mc(lbl, valHtml) {
  return '<div class="meta-cell"><div class="meta-lbl">'+lbl+'</div>'+valHtml+'</div>';
}
function pl(lbl, val) {
  return '<div class="pill"><span class="pill-lbl">'+lbl+'</span><span class="pill-val">'+esc(String(val))+'</span></div>';
}

var _toastT = null;
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast ' + (type||'') + ' show';
  clearTimeout(_toastT);
  _toastT = setTimeout(function() { t.className = 'toast '+(type||''); }, 3000);
}

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
</script>
