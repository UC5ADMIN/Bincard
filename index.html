<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RL2 Warehouse</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:15px;line-height:1.5;background:#f7f7f5;color:#1a1a1a;min-height:100vh}
button{font-family:inherit;cursor:pointer}input{font-family:inherit}
.hdr{background:#fff;border-bottom:1px solid #e0e0e0;padding:0 20px;height:52px;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:justify;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-brand{display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:10px}
.hdr-icon{width:28px;height:28px;background:#2c5f2e;border-radius:4px;flex-shrink:0;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center}
.hdr-icon svg{width:15px;height:15px;fill:#fff}
.hdr-title{font-size:15px;font-weight:600;letter-spacing:-.01em}
.hdr-sub{font-size:11px;color:#999;letter-spacing:.04em}
.wrap{max-width:960px;margin:0 auto;padding:24px 16px 48px}
.setup{background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:14px 16px;margin-bottom:20px}
.setup.ok{border-color:#a8d5b5;background:#f4fdf6}
.setup-top{display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:8px;margin-bottom:10px}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;-webkit-transition:background .2s;transition:background .2s}
.dot.on{background:#2c7a3e}
.slbl{font-size:11px;font-weight:600;color:#666;letter-spacing:.06em;text-transform:uppercase}
.sst{margin-left:auto;font-size:11px;font-weight:500;color:#999}
.sst.on{color:#2c7a3e}
.setup-fields{display:-webkit-box;display:flex;flex-wrap:wrap;gap:8px}
.sinput{-webkit-box-flex:1;flex:1;min-width:180px;border:1px solid #d0d0d0;border-radius:5px;padding:8px 11px;font-size:12px;color:#1a1a1a;outline:none;background:#fafafa}
.sinput:focus{border-color:#2c5f2e}
.sinput::placeholder{color:#bbb}
.sbtn{background:#2c5f2e;color:#fff;border:none;border-radius:5px;padding:8px 16px;font-size:12px;font-weight:600;white-space:nowrap}
.sbtn:hover{background:#245025}
.setup-hint{font-size:11px;color:#999;margin-top:8px}
.section{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:20px;margin-bottom:20px}
.sec-hdr{display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:10px;margin-bottom:18px}
.sec-ico{width:30px;height:30px;border-radius:5px;flex-shrink:0;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center}
.sec-ico svg{width:15px;height:15px}
.ico-g{background:#eaf4eb}.ico-g svg{fill:#2c5f2e}
.ico-s{background:#eef2f8}.ico-s svg{fill:#2c4a7c}
.sec-title{font-size:16px;font-weight:600;letter-spacing:-.01em}
.sec-sub{font-size:12px;color:#999;margin-top:1px}
.field{margin-bottom:16px}
.field:last-child{margin-bottom:0}
.flbl{display:block;font-size:11px;font-weight:600;color:#555;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.finput{width:100%;border:1px solid #d0d0d0;border-radius:5px;padding:10px 12px;font-size:14px;color:#1a1a1a;outline:none;background:#fafafa}
.finput:focus{border-color:#2c5f2e;background:#fff}
.finput::placeholder{color:#bbb}
.finput.mono{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;font-size:13px}
.srchwrap{position:relative}
.drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #d0d0d0;border-radius:6px;z-index:50;overflow:hidden;display:none;-webkit-box-shadow:0 4px 16px rgba(0,0,0,.1);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.drop.open{display:block}
.d-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid #f0f0f0;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:10px}
.d-item:last-child{border-bottom:none}
.d-item:hover{background:#f5faf5}
.d-code{font-size:11px;font-weight:600;color:#2c5f2e;min-width:80px;font-family:'SFMono-Regular',Consolas,monospace}
.d-name{font-size:13px;color:#1a1a1a;-webkit-box-flex:1;flex:1}
.d-stock{font-size:11px;color:#999;font-family:'SFMono-Regular',Consolas,monospace;white-space:nowrap}
.d-empty{padding:12px;font-size:12px;color:#999;font-style:italic}
.preview{margin-top:7px;padding:9px 12px;background:#eaf4eb;border:1px solid #b8dfc0;border-radius:5px;display:none;-webkit-box-align:center;align-items:center;gap:10px;flex-wrap:wrap}
.preview.show{display:-webkit-box;display:flex}
.prev-code{font-size:11px;font-weight:600;color:#2c5f2e;font-family:'SFMono-Regular',Consolas,monospace}
.prev-name{font-size:13px;color:#1a1a1a}
.prev-stock{margin-left:auto;font-size:11px;color:#666;font-family:'SFMono-Regular',Consolas,monospace}
.qty-row{display:-webkit-box;display:flex;gap:8px}
.qty-row .finput{-webkit-box-flex:1;flex:1}
.unit-chip{border:1px solid #d0d0d0;border-radius:5px;padding:10px 14px;font-size:13px;color:#888;background:#f0f0f0;white-space:nowrap;min-width:60px;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;font-family:'SFMono-Regular',Consolas,monospace}
.btn-primary{width:100%;border:none;border-radius:6px;padding:12px;font-size:15px;font-weight:600;color:#fff;letter-spacing:.01em;margin-top:4px;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;gap:7px}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-g{background:#2c5f2e}.btn-g:hover{background:#245025}
.btn-s{background:#2c4a7c}.btn-s:hover{background:#23397a}
.btn-view{background:#2c4a7c;color:#fff;border:none;border-radius:6px;padding:10px 20px;font-size:14px;font-weight:600;white-space:nowrap}
.btn-view:hover{background:#23397a}
.btn-view:disabled{opacity:.5;cursor:not-allowed}
.btn-print{background:transparent;border:1px solid #d0d0d0;color:#666;border-radius:5px;padding:7px 14px;font-size:12px;float:right}
.btn-print:hover{border-color:#2c4a7c;color:#2c4a7c}
.bc-row{display:-webkit-box;display:flex;gap:8px;margin-bottom:8px}
.bc-row .srchwrap{-webkit-box-flex:1;flex:1}
.status{font-size:12px;color:#999;min-height:18px;margin-bottom:12px}
.status.err{color:#c0392b}
.status.busy{color:#2c4a7c}
.bc-result{display:none}
.bc-result.show{display:block}
.meta-grid{display:-webkit-box;display:flex;flex-wrap:wrap;border:1px solid #e0e0e0;border-radius:6px;overflow:hidden;margin-bottom:14px}
.mc{-webkit-box-flex:1;flex:1;min-width:150px;padding:11px 14px;border-right:1px solid #e0e0e0;border-bottom:1px solid #e0e0e0;background:#fff}
.mc:last-child{border-right:none}
.ml{font-size:10px;font-weight:600;color:#999;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.mv{font-size:15px;font-weight:600;color:#1a1a1a}
.mv.code{font-family:'SFMono-Regular',Consolas,monospace;font-size:13px;color:#2c5f2e}
.mv.good{color:#2c7a3e}.mv.warn{color:#c0392b}
.pills{display:-webkit-box;display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.pill{border:1px solid #e0e0e0;border-radius:4px;padding:7px 12px;background:#fff;display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;gap:8px}
.pl{font-size:10px;font-weight:600;color:#999;letter-spacing:.06em;text-transform:uppercase}
.pv{font-size:13px;font-weight:600;color:#1a1a1a;font-family:'SFMono-Regular',Consolas,monospace}
.tbl-wrap{overflow-x:auto;border:1px solid #e0e0e0;border-radius:6px;margin-top:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#f5f5f3}
th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:#888;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid #e0e0e0}
th.r{text-align:right}
tbody tr{border-bottom:1px solid #f0f0f0}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fafafa}
tr.t-open{background:#fdfcf8}
tr.t-recv{background:#f0f6ff}
td{padding:9px 12px;color:#1a1a1a;white-space:nowrap}
td.r{text-align:right}
td.dim{color:#888}
td.in{color:#2c7a3e;font-weight:600}
td.in-r{color:#2c4a7c;font-weight:600}
td.out{color:#c0392b;font-weight:600}
td.bal{font-weight:700}
td.bal-low{color:#c0392b!important;font-weight:700}
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.b-open{background:#fef3e2;color:#976b1a}
.b-issue{background:#fdecea;color:#b03030}
.b-recv{background:#e8f0fc;color:#2c4a7c}
.pgn{display:-webkit-box;display:flex;-webkit-box-align:center;align-items:center;-webkit-box-pack:center;justify-content:center;gap:12px;margin-top:14px}
.pgn-btn{border:1px solid #d0d0d0;background:#fff;border-radius:4px;padding:6px 14px;font-size:12px;font-weight:600;color:#444}
.pgn-btn:hover{border-color:#2c4a7c;color:#2c4a7c}
.pgn-btn:disabled{opacity:.4;cursor:not-allowed}
.pgn-info{font-size:12px;color:#888}
.divider{border:none;border-top:1px solid #e8e8e8;margin:20px 0}
.toast{position:fixed;bottom:20px;left:50%;-webkit-transform:translateX(-50%) translateY(12px);transform:translateX(-50%) translateY(12px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:6px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;-webkit-transition:all .22s;transition:all .22s;z-index:999;white-space:nowrap}
.toast.ok{background:#2c7a3e}
.toast.err{background:#c0392b}
.toast.show{opacity:1;-webkit-transform:translateX(-50%) translateY(0);transform:translateX(-50%) translateY(0)}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;-webkit-animation:spin .7s linear infinite;animation:spin .7s linear infinite;vertical-align:middle}
.spin-d{border-color:#e0e0e0;border-top-color:#2c4a7c}
@-webkit-keyframes spin{to{-webkit-transform:rotate(360deg)}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.hdr{padding:0 14px}.wrap{padding:14px 12px 40px}.section{padding:16px}.mc{min-width:130px}.bc-row{-webkit-box-orient:vertical;-webkit-box-direction:normal;flex-direction:column}}
@media print{body{background:#fff}.hdr,.setup,.section:first-of-type,.divider,.btn-print,.pills,.status,.pgn{display:none!important}.section{border:none;padding:0}.tbl-wrap,.meta-grid{border-color:#ccc}tr.t-recv{background:#eef4ff}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-icon">
      <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2zm0 12H4V9h16v10zM4 5h16V3H4v2z"/></svg>
    </div>
    <div>
      <div class="hdr-title">RL2 Warehouse</div>
      <div class="hdr-sub">RAW MATERIAL STORE</div>
    </div>
  </div>
</div>

<div class="wrap">

  <div class="setup" id="setup">
    <div class="setup-top">
      <div class="dot" id="dot"></div>
      <span class="slbl">Connection</span>
      <span class="sst" id="sst">Not connected</span>
    </div>
    <div class="setup-fields">
      <input type="url" class="sinput" id="apiUrl" placeholder="Apps Script URL" autocomplete="off" />
      <input type="text" class="sinput" id="sheetId" placeholder="Sheet ID" autocomplete="off" />
      <button class="sbtn" onclick="saveSetup()">Connect</button>
    </div>
    <div class="setup-hint" id="setupHint"></div>
  </div>

  <!-- RECEIVE STOCK -->
  <div class="section">
    <div class="sec-hdr">
      <div class="sec-ico ico-g">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      </div>
      <div>
        <div class="sec-title">Receive Stock</div>
        <div class="sec-sub">Add incoming material to inventory</div>
      </div>
    </div>
    <div class="field">
      <label class="flbl">Item</label>
      <div class="srchwrap" id="rcvWrap">
        <input type="text" class="finput" id="rcvSearch" placeholder="Type item code or name…" autocomplete="off"
          oninput="onRcvInput(this.value)" onkeydown="if(event.key==='Escape')closeDrop('rcvDrop')" />
        <div class="drop" id="rcvDrop"></div>
      </div>
      <div class="preview" id="rcvPreview">
        <span class="prev-code" id="prevCode"></span>
        <span class="prev-name" id="prevName"></span>
        <span class="prev-stock" id="prevStock"></span>
      </div>
    </div>
    <div class="field">
      <label class="flbl">Quantity Received</label>
      <div class="qty-row">
        <input type="number" class="finput mono" id="rcvQty" placeholder="0" min="0.001" step="any" />
        <div class="unit-chip" id="rcvUnit">—</div>
      </div>
    </div>
    <div class="field">
      <label class="flbl">Remarks <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#aaa">(optional)</span></label>
      <input type="text" class="finput" id="rcvRemarks" placeholder="Invoice no., supplier…" />
    </div>
    <button class="btn-primary btn-g" id="rcvBtn" onclick="submitReceipt()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      Confirm Receipt
    </button>
  </div>

  <hr class="divider">

  <!-- BIN CARD -->
  <div class="section">
    <div class="sec-hdr">
      <div class="sec-ico ico-s">
        <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
      </div>
      <div>
        <div class="sec-title">Bin Card</div>
        <div class="sec-sub">Full transaction ledger for any item</div>
      </div>
    </div>
    <div class="bc-row">
      <div class="srchwrap" id="bcWrap">
        <input type="text" class="finput" id="bcSearch" placeholder="Type item code or name…" autocomplete="off"
          oninput="onBcInput(this.value)" onkeydown="onBcKey(event)" />
        <div class="drop" id="bcDrop"></div>
      </div>
      <button class="btn-view" id="bcBtn" onclick="triggerBc()">View</button>
    </div>
    <div class="status" id="bcSt"></div>
    <div class="bc-result" id="bcResult">
      <button class="btn-print" onclick="window.print()">⎙ Print</button>
      <div class="meta-grid" id="metaGrid"></div>
      <div class="pills"     id="bcPills"></div>
      <div style="clear:both"></div>
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th><th>Date</th><th>Type</th><th>Category</th>
              <th>Reference</th><th class="r">In</th>
              <th class="r">Out</th><th class="r">Balance</th><th>Unit</th>
            </tr>
          </thead>
          <tbody id="bcBody"></tbody>
        </table>
      </div>
      <div class="pgn" id="pgn" style="display:none">
        <button class="pgn-btn" id="pgPrev" onclick="changePage(-1)">&#8592; Prev</button>
        <span class="pgn-info" id="pgInfo"></span>
        <button class="pgn-btn" id="pgNext" onclick="changePage(1)">Next &#8594;</button>
      </div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════
//  CONFIG & STATE
// ════════════════════════════════════════════════════════════
var SHEET_ID    = localStorage.getItem('rl2_sheet_id') || '';
var API_URL     = localStorage.getItem('rl2_api_url')  || '';
var PAGE_SIZE   = 50;
var BC_CACHE_MS = 5 * 60 * 1000; // 5 min localStorage cache per item

var _searchCache = {}; // in-memory, cleared on refresh
var _bcRows = [], _bcPage = 0, _bcCode = null;

// Receipt state — _rcvRowIdx lets backend skip Inventory scan
var _rcvItem   = null;
var _rcvRowIdx = -1;
var _rcvT = null, _bcT = null;

// ════════════════════════════════════════════════════════════
//  INIT — restore saved settings + warm up Apps Script
// ════════════════════════════════════════════════════════════
(function(){
  if (API_URL)  document.getElementById('apiUrl').value   = API_URL;
  if (SHEET_ID) document.getElementById('sheetId').value  = SHEET_ID;
  if (API_URL && SHEET_ID) {
    setConnected(true);
    warmApi(); // Fix 3: ping Apps Script immediately on page load
  }
})();

// ════════════════════════════════════════════════════════════
//  FIX 3 — WARM PING
//  Fires a lightweight ?action=ping as soon as the page loads.
//  By the time the user fills in the form, Apps Script is
//  already warm — cold start absorbed silently in background.
// ════════════════════════════════════════════════════════════
function warmApi() {
  if (!API_URL) return;
  var xhr = new XMLHttpRequest();
  xhr.open('GET', API_URL + '?action=ping', true);
  xhr.send(); // fire and forget — we don't care about the response
}

// ════════════════════════════════════════════════════════════
//  SETUP
// ════════════════════════════════════════════════════════════
function setConnected(ok) {
  document.getElementById('dot').className  = ok ? 'dot on' : 'dot';
  document.getElementById('sst').className  = ok ? 'sst on' : 'sst';
  document.getElementById('sst').textContent = ok ? '✓ Connected' : 'Not connected';
  document.getElementById('setup').className = ok ? 'setup ok' : 'setup';
}
function saveSetup() {
  var api   = document.getElementById('apiUrl').value.trim();
  var sheet = document.getElementById('sheetId').value.trim();
  var hint  = document.getElementById('setupHint');
  if (!api || api.indexOf('https://') !== 0) { hint.textContent='⚠ Enter a valid Apps Script URL.';hint.style.color='#c0392b';return; }
  if (!sheet) { hint.textContent='⚠ Enter your Sheet ID.';hint.style.color='#c0392b';return; }
  API_URL=api; SHEET_ID=sheet;
  localStorage.setItem('rl2_api_url', api);
  localStorage.setItem('rl2_sheet_id', sheet);
  hint.textContent=''; setConnected(true);
  warmApi(); // warm immediately after connecting
}

// ════════════════════════════════════════════════════════════
//  GVIZ — direct fast reads from Google Sheets
// ════════════════════════════════════════════════════════════
function gvizFetch(sheetName, tq, onSuccess, onError) {
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
            '/gviz/tq?sheet=' + encodeURIComponent(sheetName) +
            '&tqx=out:json' +
            (tq ? '&tq=' + encodeURIComponent(tq) : '');
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 400) {
      try {
        var raw = xhr.responseText;
        var s = raw.indexOf('{'), e = raw.lastIndexOf('}');
        if (s === -1 || e === -1) throw new Error('Bad GViz response');
        var json = JSON.parse(raw.substring(s, e+1));
        if (json.status === 'error') {
          if (onError) onError(json.errors&&json.errors[0]?json.errors[0].detailed_message:'GViz error');
          return;
        }
        if (onSuccess) onSuccess(parseGviz(json.table));
      } catch(ex) { if (onError) onError('Parse error: '+ex.message); }
    } else { if (onError) onError('HTTP '+xhr.status); }
  };
  xhr.onerror = function(){ if(onError)onError('Network error'); };
  xhr.send();
}

function parseGviz(table) {
  if (!table||!table.cols||!table.rows) return [];
  var cols=table.cols, out=[];
  for (var i=0;i<table.rows.length;i++) {
    var cells=table.rows[i].c, row={};
    for (var j=0;j<cols.length;j++) {
      var cell=cells[j], lbl=cols[j].label||('col'+j), type=cols[j].type;
      if (!cell||cell.v===null||cell.v===undefined) { row[lbl]=''; }
      else if (type==='date'||type==='datetime') { row[lbl]=cell.f||gvizDateStr(cell.v); }
      else { row[lbl]=cell.v; }
    }
    out.push(row);
  }
  return out;
}

function gvizDateStr(v) {
  if (typeof v==='string'&&v.indexOf('Date(')===0) {
    var p=v.replace('Date(','').replace(')','').split(',');
    var d=new Date(parseInt(p[0]),parseInt(p[1]),parseInt(p[2]),p[3]?parseInt(p[3]):0,p[4]?parseInt(p[4]):0);
    var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var pad=function(n){return n<10?'0'+n:''+n};
    return pad(d.getDate())+'-'+mo[d.getMonth()]+'-'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes());
  }
  return String(v);
}

// ════════════════════════════════════════════════════════════
//  APPS SCRIPT — write calls only
// ════════════════════════════════════════════════════════════
function apiFetch(params, onSuccess, onError) {
  if (!API_URL) { if(onError)onError('No API URL.'); return; }
  var qs=[];
  for (var k in params) { if(params.hasOwnProperty(k))qs.push(encodeURIComponent(k)+'='+encodeURIComponent(params[k])); }
  var url=API_URL+'?'+qs.join('&');
  var xhr=new XMLHttpRequest();
  xhr.open('GET',url,true);
  xhr.onload=function(){
    if(xhr.status>=200&&xhr.status<400){
      try{var d=JSON.parse(xhr.responseText);if(onSuccess)onSuccess(d);}
      catch(e){if(onError)onError('Invalid response');}
    }else{if(onError)onError('HTTP '+xhr.status);}
  };
  xhr.onerror=function(){
    if(window.fetch){
      window.fetch(url,{redirect:'follow'}).then(function(r){return r.json();})
        .then(function(d){if(onSuccess)onSuccess(d);}).catch(function(e){if(onError)onError(e.message);});
    }else{if(onError)onError('Network error');}
  };
  xhr.send();
}

// ════════════════════════════════════════════════════════════
//  DROPDOWN HELPERS
// ════════════════════════════════════════════════════════════
function openDrop(id,html){var el=document.getElementById(id);el.innerHTML=html;el.className='drop open';}
function closeDrop(id){document.getElementById(id).className='drop';}
document.addEventListener('click',function(e){
  if(!document.getElementById('rcvWrap').contains(e.target))closeDrop('rcvDrop');
  if(!document.getElementById('bcWrap').contains(e.target))closeDrop('bcDrop');
});
function attachClicks(dropId,results,onSelect){
  var items=document.getElementById(dropId).getElementsByClassName('d-item');
  for(var i=0;i<items.length;i++){(function(idx){items[idx].onclick=function(){onSelect(results[idx]);};})(i);}
}
function buildDropHtml(results){
  if(!results||!results.length)return '<div class="d-empty">No items found</div>';
  var h='';
  for(var i=0;i<results.length&&i<10;i++){
    var r=results[i];
    var code=r['Material Code']||r['Item Code']||'';
    var name=r['Item Name']||'';
    var stock=r['Opening Stock']!==undefined?r['Opening Stock']:(r['Quantity']!==undefined?r['Quantity']:'');
    h+='<div class="d-item"><span class="d-code">'+esc(code)+'</span><span class="d-name">'+esc(name)+'</span><span class="d-stock">'+(stock!==''?stock:'')+'</span></div>';
  }
  return h;
}

// ════════════════════════════════════════════════════════════
//  RECEIVE SEARCH
//  Also fetches rowIndex from Inventory sheet via GViz
//  so the backend skips its O(n) scan (Fix 2)
// ════════════════════════════════════════════════════════════
function onRcvInput(v){
  _rcvItem=null; _rcvRowIdx=-1; clearPreview();
  clearTimeout(_rcvT);
  if(!v.trim()){closeDrop('rcvDrop');return;}
  _rcvT=setTimeout(function(){doRcvSearch(v.trim());},400);
}

function doRcvSearch(q){
  var ckey='rcv_'+q.toLowerCase();
  if(_searchCache[ckey]){showRcvResults(_searchCache[ckey]);return;}
  if(!SHEET_ID){openDrop('rcvDrop','<div class="d-empty">Please connect first</div>');return;}
  var tq="SELECT A,B,C WHERE LOWER(A) CONTAINS '"+q.toLowerCase().replace(/'/g,"\\'")+
         "' OR LOWER(B) CONTAINS '"+q.toLowerCase().replace(/'/g,"\\'"+"' LIMIT 10");
  gvizFetch('Starting Quantity',tq,function(rows){
    _searchCache[ckey]=rows; showRcvResults(rows);
  },function(){openDrop('rcvDrop','<div class="d-empty">Search failed</div>');});
}

function showRcvResults(rows){
  if(!rows||!rows.length){openDrop('rcvDrop','<div class="d-empty">No items found</div>');return;}
  openDrop('rcvDrop',buildDropHtml(rows));
  attachClicks('rcvDrop',rows,function(item){
    _rcvItem=item;
    var code=item['Material Code']||'';
    var name=item['Item Name']||'';
    document.getElementById('rcvSearch').value=code+' — '+name;
    document.getElementById('prevCode').textContent=code;
    document.getElementById('prevName').textContent=name;
    document.getElementById('prevStock').textContent='Opening: '+(item['Opening Stock']||'—');
    document.getElementById('rcvPreview').className='preview show';
    closeDrop('rcvDrop');

    // Fix 2: Look up rowIndex in Inventory sheet in background
    // By the time user fills qty + clicks Confirm, this is already done
    fetchRowIndex(code);
    document.getElementById('rcvQty').focus();
  });
}

// Fetch the rowIndex from Inventory sheet via GViz
// GViz returns row numbers via rowNum() — we use that to get sheet row
function fetchRowIndex(code){
  _rcvRowIdx=-1; // reset while fetching
  if(!SHEET_ID) return;
  // ROW() in GViz gives the 1-based row number in the sheet
  var tq="SELECT B, rowNum() WHERE B='"+code.replace(/'/g,"\\'"+"' LIMIT 1");
  gvizFetch('Inventory',tq,function(rows){
    if(rows&&rows.length){
      // rowNum() column label varies — find it
      var keys=Object.keys(rows[0]);
      for(var i=0;i<keys.length;i++){
        var val=rows[0][keys[i]];
        if(typeof val==='number'&&val>1){_rcvRowIdx=val;break;}
      }
    }
  },function(){_rcvRowIdx=-1;});  // fallback — backend will scan
}

function clearPreview(){document.getElementById('rcvPreview').className='preview';}

// ════════════════════════════════════════════════════════════
//  FIX 1 — OPTIMISTIC RECEIPT SUBMIT
//  1. Show success immediately (optimistic)
//  2. Reset form immediately
//  3. Fire API call in background
//  4. If API fails → show error toast (rare)
// ════════════════════════════════════════════════════════════
function submitReceipt(){
  if(!API_URL){showToast('Please connect first.','err');return;}
  if(!_rcvItem){showToast('Select an item first.','err');return;}
  var qty=parseFloat(document.getElementById('rcvQty').value);
  if(!qty||isNaN(qty)||qty<=0){showToast('Enter a valid quantity.','err');return;}
  var remarks=document.getElementById('rcvRemarks').value.trim();
  var code=_rcvItem['Material Code']||'';
  var name=_rcvItem['Item Name']||'';
  var rowIdx=_rcvRowIdx; // may be -1 if not resolved yet — backend handles fallback

  // ── OPTIMISTIC: show success and reset form immediately ──
  showToast('✓ Receipt recorded — ' + qty + ' of ' + name, 'ok');

  // Invalidate bin card cache for this item
  invalidateBcCache(code);

  // Auto-refresh bin card if it's currently open for this item
  if(_bcCode===code && document.getElementById('bcResult').className==='bc-result show'){
    loadBinCard(code);
  }

  // Reset form right away — don't wait for server
  document.getElementById('rcvSearch').value   = '';
  document.getElementById('rcvQty').value      = '';
  document.getElementById('rcvRemarks').value  = '';
  document.getElementById('rcvUnit').textContent = '—';
  clearPreview();
  _rcvItem=null; _rcvRowIdx=-1;

  // ── BACKGROUND: fire the actual write ──
  apiFetch(
    {action:'receiveItem', itemCode:code, rowIndex:rowIdx, qty:qty, remarks:remarks, timestamp:new Date().toISOString()},
    function(res){
      if(!res.success){
        // Write failed — notify user so they can re-enter
        showToast('⚠ Write failed: '+(res.error||'Unknown')+'. Please re-record.','err');
      }
      // Update unit chip on next selection — no action needed here
    },
    function(err){
      showToast('⚠ Network error: '+err+'. Please re-record.','err');
    }
  );
}

// ════════════════════════════════════════════════════════════
//  BIN CARD SEARCH
// ════════════════════════════════════════════════════════════
function onBcInput(v){
  _bcCode=null; clearTimeout(_bcT);
  if(v.length<2){closeDrop('bcDrop');return;}
  _bcT=setTimeout(function(){doBcSearch(v.trim());},400);
}
function onBcKey(e){if(e.key==='Enter')triggerBc();if(e.key==='Escape')closeDrop('bcDrop');}

function doBcSearch(q){
  var ckey='bc_'+q.toLowerCase();
  if(_searchCache[ckey]){showBcDropResults(_searchCache[ckey]);return;}
  if(!SHEET_ID){openDrop('bcDrop','<div class="d-empty">Please connect first</div>');return;}
  var tq="SELECT A,B,C WHERE LOWER(A) CONTAINS '"+q.toLowerCase().replace(/'/g,"\\'")+
         "' OR LOWER(B) CONTAINS '"+q.toLowerCase().replace(/'/g,"\\'"+"' LIMIT 10");
  gvizFetch('Starting Quantity',tq,function(rows){
    _searchCache[ckey]=rows; showBcDropResults(rows);
  },function(){openDrop('bcDrop','<div class="d-empty">Search failed</div>');});
}

function showBcDropResults(rows){
  if(!rows||!rows.length){openDrop('bcDrop','<div class="d-empty">No items found</div>');return;}
  openDrop('bcDrop',buildDropHtml(rows));
  attachClicks('bcDrop',rows,function(item){
    var code=item['Material Code']||'';
    var name=item['Item Name']||'';
    _bcCode=code;
    document.getElementById('bcSearch').value=code+' — '+name;
    closeDrop('bcDrop');
    loadBinCard(code);
  });
}
function triggerBc(){
  var v=document.getElementById('bcSearch').value.trim();
  if(!v)return;
  loadBinCard(_bcCode||v.split('—')[0].trim());
}

// ════════════════════════════════════════════════════════════
//  BIN CARD LOAD — 3 parallel GViz queries, localStorage cache
// ════════════════════════════════════════════════════════════
function bcCacheKey(c){return 'rl2_bc_'+c;}
function getBcCache(c){try{var r=localStorage.getItem(bcCacheKey(c));if(!r)return null;var o=JSON.parse(r);if(Date.now()-o.ts>BC_CACHE_MS){localStorage.removeItem(bcCacheKey(c));return null;}return o.data;}catch(e){return null;}}
function setBcCache(c,d){try{localStorage.setItem(bcCacheKey(c),JSON.stringify({ts:Date.now(),data:d}));}catch(e){}}
function invalidateBcCache(c){try{localStorage.removeItem(bcCacheKey(c));}catch(e){}}

function setBcSt(m,c){var el=document.getElementById('bcSt');el.textContent=m;el.className=c?'status '+c:'status';}

function loadBinCard(code){
  if(!SHEET_ID){setBcSt('Please connect first.','err');return;}
  _bcCode=code;
  var cached=getBcCache(code);
  if(cached){
    setBcSt(cached.txCount+' transaction(s) · Balance: '+cached.currentBalance+' '+cached.unit+' (cached)');
    _bcRows=cached.rows;_bcPage=0;renderBinCard(cached);renderPage();return;
  }
  setBcSt('Loading…','busy');
  document.getElementById('bcBtn').disabled=true;
  document.getElementById('bcResult').className='bc-result';

  var results={sq:null,il:null,rl:null},errors=[],done=0;
  function check(){
    done++;if(done<3)return;
    document.getElementById('bcBtn').disabled=false;
    if(errors.length===3){setBcSt('Failed to load data.','err');return;}
    assembleBinCard(code,results);
  }
  var sqTq="SELECT A,B,C,D WHERE A='"+code.replace(/'/g,"\\'"+"' LIMIT 1");
  gvizFetch('Starting Quantity',sqTq,function(r){results.sq=r;check();},function(e){errors.push(e);results.sq=[];check();});
  var ilTq="SELECT A,B,C,D,E,F,G,H WHERE C='"+code.replace(/'/g,"\\'"+"' ORDER BY A ASC");
  gvizFetch('Issue Log',ilTq,function(r){results.il=r;check();},function(e){errors.push(e);results.il=[];check();});
  var rlTq="SELECT A,B,C,D,E,F,G,H WHERE C='"+code.replace(/'/g,"\\'"+"' ORDER BY A ASC");
  gvizFetch('Receipt Log',rlTq,function(r){results.rl=r;check();},function(e){errors.push(e);results.rl=[];check();});
}

function assembleBinCard(code,results){
  var sqRows=results.sq||[],ilRows=results.il||[],rlRows=results.rl||[];
  if(!sqRows.length){setBcSt('Item "'+code+'" not found in Starting Quantity sheet.','err');return;}
  var sq=sqRows[0];
  var itemName=sq['Item Name']||sq['B']||'';
  var openingStock=parseFloat(sq['Opening Stock']||sq['C'])||0;
  var openingDate=sq['Date']||sq['D']||'';
  var txns=[],unit='';

  for(var i=0;i<ilRows.length;i++){
    var r=ilRows[i],qty=parseFloat(r['Qty Issued']||r['E'])||0,u=r['Unit']||r['G']||'';
    if(!unit&&u)unit=u;
    txns.push({date:r['Timestamp']||r['A']||'',type:'issue',category:r['Category']||r['B']||'',qty:qty,unit:u,ref:r['Issued To']||r['H']||''});
  }
  for(var j=0;j<rlRows.length;j++){
    var rr=rlRows[j],rqty=parseFloat(rr['Qty Received']||rr['E'])||0,ru=rr['Unit']||rr['G']||'';
    if(!unit&&ru)unit=ru;
    txns.push({date:rr['Timestamp']||rr['A']||'',type:'receipt',category:rr['Category']||rr['B']||'',qty:rqty,unit:ru,ref:rr['Remarks']||rr['H']||''});
  }
  txns.sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});

  var balance=openingStock,totalIssued=0,totalReceived=0,rows=[];
  rows.push({date:openingDate,particulars:'Opening Balance',category:'',ref:'',qtyIn:openingStock,qtyOut:null,balance:openingStock,unit:unit});
  for(var k=0;k<txns.length;k++){
    var tx=txns[k];
    if(tx.type==='issue'){balance-=tx.qty;totalIssued+=tx.qty;rows.push({date:tx.date,particulars:'Issue',category:tx.category,ref:tx.ref,qtyIn:null,qtyOut:tx.qty,balance:Math.round(balance*10000)/10000,unit:tx.unit||unit});}
    else{balance+=tx.qty;totalReceived+=tx.qty;rows.push({date:tx.date,particulars:'Receipt',category:tx.category,ref:tx.ref,qtyIn:tx.qty,qtyOut:null,balance:Math.round(balance*10000)/10000,unit:tx.unit||unit});}
  }
  var data={itemCode:code,itemName:itemName,unit:unit,openingStock:openingStock,openingDate:openingDate,
    currentBalance:Math.round(balance*10000)/10000,totalIssued:Math.round(totalIssued*10000)/10000,
    totalReceived:Math.round(totalReceived*10000)/10000,txCount:txns.length,rows:rows};
  setBcCache(code,data);
  setBcSt(data.txCount+' transaction(s) · Balance: '+data.currentBalance+' '+data.unit);
  _bcRows=rows;_bcPage=0;
  renderBinCard(data);renderPage();
}

function renderBinCard(d){
  var pct=d.openingStock>0?(d.totalIssued/d.openingStock)*100:0;
  var bc=(d.currentBalance<=0||pct>=90)?'mv warn':'mv good';
  document.getElementById('metaGrid').innerHTML=
    mc('Item Code','<span class="mv code">'+esc(d.itemCode)+'</span>')+
    mc('Item Name','<span class="mv">'+esc(d.itemName)+'</span>')+
    mc('Unit','<span class="mv">'+esc(d.unit)+'</span>')+
    mc('Opening Stock','<span class="mv">'+d.openingStock+'</span>')+
    mc('Opening Date','<span class="mv">'+esc(d.openingDate)+'</span>')+
    mc('Balance','<span class="'+bc+'">'+d.currentBalance+'</span>');
  document.getElementById('bcPills').innerHTML=
    pl('Transactions',d.txCount)+pl('Issued',d.totalIssued+' '+esc(d.unit))+
    pl('Received',d.totalReceived+' '+esc(d.unit))+
    pl('% Consumed',d.openingStock>0?Math.round(pct)+'%':'—');
  document.getElementById('bcResult').className='bc-result show';
}

function renderPage(){
  var start=_bcPage*PAGE_SIZE,end=Math.min(start+PAGE_SIZE,_bcRows.length);
  var tbody='',totalP=Math.ceil(_bcRows.length/PAGE_SIZE);
  for(var i=start;i<end;i++){
    var row=_bcRows[i],isOpen=row.particulars==='Opening Balance',isRecv=row.particulars==='Receipt';
    var trCls=isOpen?'t-open':isRecv?'t-recv':'';
    var bdg=isOpen?'badge b-open':isRecv?'badge b-recv':'badge b-issue';
    var bl=row.balance<=0?' bal-low':'';
    var ic=isOpen?'in':isRecv?'in-r':'';
    tbody+='<tr class="'+trCls+'"><td class="dim">'+i+'</td><td class="dim">'+esc(row.date)+'</td>'+
      '<td><span class="'+bdg+'">'+esc(row.particulars)+'</span></td>'+
      '<td class="dim">'+esc(row.category)+'</td><td class="dim">'+esc(row.ref)+'</td>'+
      '<td class="r '+ic+'">'+(row.qtyIn!=null?row.qtyIn:'—')+'</td>'+
      '<td class="r out">'+(row.qtyOut!=null?row.qtyOut:'—')+'</td>'+
      '<td class="r bal'+bl+'">'+row.balance+'</td><td class="dim">'+esc(row.unit)+'</td></tr>';
  }
  if(!tbody)tbody='<tr><td colspan="9" style="text-align:center;padding:24px;color:#999;font-style:italic">No transactions found.</td></tr>';
  document.getElementById('bcBody').innerHTML=tbody;
  var pgn=document.getElementById('pgn');
  if(totalP<=1){pgn.style.display='none';}
  else{
    pgn.style.display='';
    document.getElementById('pgInfo').textContent='Page '+(_bcPage+1)+' of '+totalP+' · '+_bcRows.length+' rows';
    document.getElementById('pgPrev').disabled=(_bcPage===0);
    document.getElementById('pgNext').disabled=(_bcPage>=totalP-1);
  }
}
function changePage(dir){
  var totalP=Math.ceil(_bcRows.length/PAGE_SIZE);
  _bcPage+=dir;if(_bcPage<0)_bcPage=0;if(_bcPage>=totalP)_bcPage=totalP-1;
  renderPage();
  document.getElementById('bcResult').scrollIntoView({behavior:'smooth',block:'start'});
}

// ════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════
function mc(l,v){return '<div class="mc"><div class="ml">'+l+'</div>'+v+'</div>';}
function pl(l,v){return '<div class="pill"><span class="pl">'+l+'</span><span class="pv">'+esc(String(v))+'</span></div>';}
var _toastT=null;
function showToast(msg,type){
  var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'')+' show';
  clearTimeout(_toastT);_toastT=setTimeout(function(){t.className='toast '+(type||'');},3200);
}
function esc(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
